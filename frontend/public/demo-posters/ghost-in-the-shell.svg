<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ghost in the Shell demo poster</title>
  <desc id="desc">Neon cyberpunk poster for deactivated demo catalog entries.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect x="80" y="190" width="440" height="420" rx="24" fill="#0f172a" opacity="0.58" stroke="#22d3ee" stroke-width="4"/>
  <g stroke="#67e8f9" stroke-width="3" opacity="0.6">
    <line x1="120" y1="250" x2="480" y2="250"/>
    <line x1="120" y1="360" x2="480" y2="360"/>
    <line x1="120" y1="470" x2="480" y2="470"/>
    <line x1="200" y1="210" x2="200" y2="570"/>
    <line x1="320" y1="210" x2="320" y2="570"/>
    <line x1="440" y1="210" x2="440" y2="570"/>
  </g>
  <text x="70" y="120" fill="#cffafe" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="28" letter-spacing="5">CINEMA SHOWCASE</text>
  <text x="70" y="690" fill="#f5f3ff" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="76" font-weight="700">GHOST IN</text>
  <text x="70" y="772" fill="#f5f3ff" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="76" font-weight="700">THE SHELL</text>
</svg>
