<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Your Name demo poster</title>
  <desc id="desc">Blue sky poster with a comet streak for seeded demo data.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <path d="M90 150C220 80 360 120 520 40" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
  <path d="M90 160C220 90 360 130 520 50" stroke="#fca5a5" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <circle cx="160" cy="690" r="130" fill="#93c5fd" opacity="0.13"/>
  <text x="70" y="120" fill="#e0f2fe" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="28" letter-spacing="5">CINEMA SHOWCASE</text>
  <text x="70" y="520" fill="#f8fafc" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="96" font-weight="700">YOUR</text>
  <text x="70" y="612" fill="#f8fafc" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="96" font-weight="700">NAME</text>
  <text x="70" y="700" fill="#fde68a" font-family="Trebuchet MS, DejaVu Sans, sans-serif" font-size="30">romance / fantasy / drama</text>
